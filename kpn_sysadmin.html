<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>システム管理画面 | KeiCall Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kosugi Maru', 'Noto Sans JP', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-2 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-xl md:text-3xl font-bold text-slate-900 mb-4 md:mb-6 flex items-center gap-2 border-b-4 border-indigo-200 pb-3">
            <span>⚙️</span> システム管理ダッシュボード
            <a href="./" class="ml-auto text-xs md:text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1.5 md:px-4 md:py-2 rounded-lg transition font-normal text-slate-700">ホームへ</a>
        </h1>

        <div id="loading" class="text-center py-10 font-bold text-slate-500 hidden">データを読み込み中...</div>

        <div id="dashboard" class="hidden">
            <!-- Metrics -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4 mb-4 md:mb-6">
                <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-[10px] md:text-sm font-bold text-slate-500 mb-1">総プロジェクト数</p>
                    <p id="stat-total" class="text-2xl md:text-4xl font-bold text-indigo-600">0</p>
                </div>
                <div class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-[10px] md:text-sm font-bold text-slate-500 mb-1">総登録メンバー</p>
                    <p id="stat-members" class="text-2xl md:text-4xl font-bold text-blue-600">0</p>
                </div>
                <div class="col-span-2 md:col-span-1 bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 text-center cursor-help">
                    <p class="text-[10px] md:text-sm font-bold text-slate-500 mb-1">削除推奨（6ヶ月経過）</p>
                    <p id="stat-obsolete" class="text-2xl md:text-4xl font-bold text-rose-600">0</p>
                </div>
            </div>

            <div class="mb-3 flex justify-between items-center">
                <p class="text-xs text-slate-500 hidden md:block">削除対象のプロジェクトを整理できます。</p>
                <div class="w-full md:w-auto text-right">
                    <button onclick="bulkDelete()" class="w-full md:w-auto bg-rose-600 hover:bg-rose-700 text-white font-bold px-4 py-3 md:py-2 rounded-xl shadow-sm text-sm transition active:scale-95 flex items-center justify-center gap-2">
                        <span>🗑️</span> チェックした項目を一括削除
                    </button>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <table class="w-full text-xs md:text-sm text-left whitespace-nowrap">
                    <thead class="bg-slate-100 text-slate-600 font-bold text-[10px] md:text-xs uppercase border-b-2">
                        <tr>
                            <th class="px-2 py-3 text-center w-8"><input type="checkbox" id="chk-all" onclick="toggleAll(this)" class="w-4 h-4 cursor-pointer scale-125 md:scale-100"></th>
                            <th class="px-2 md:px-4 py-3 w-16">状態</th>
                            <th class="px-2 md:px-4 py-3">公演名</th>
                            <th class="px-2 md:px-4 py-3 text-center">人数</th>
                            <th class="px-2 md:px-4 py-3">日程 (開始〜終了)</th>
                            <th class="px-2 md:px-4 py-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="project-list" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 利用ログ -->
        <div id="log-section" class="hidden mt-6">
            <h2 class="text-base md:text-lg font-bold text-slate-700 mb-3 border-b-2 border-slate-200 pb-2">📊 利用ログ（直近200件）</h2>

            <!-- 累計カード -->
            <div class="grid grid-cols-3 gap-2 md:gap-4 mb-5">
                <div class="bg-white p-3 md:p-5 rounded-2xl shadow-sm border text-center">
                    <p class="text-[10px] md:text-sm font-bold text-slate-500 mb-1">累計作成数</p>
                    <p id="log-created" class="text-3xl md:text-4xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-white p-3 md:p-5 rounded-2xl shadow-sm border text-center">
                    <p class="text-[10px] md:text-sm font-bold text-slate-500 mb-1">累計削除数</p>
                    <p id="log-deleted" class="text-3xl md:text-4xl font-bold text-rose-500">0</p>
                </div>
                <div class="bg-white p-3 md:p-5 rounded-2xl shadow-sm border text-center">
                    <p class="text-[10px] md:text-sm font-bold text-slate-500 mb-1">延べ参加者数</p>
                    <p id="log-members" class="text-3xl md:text-4xl font-bold text-indigo-600">0</p>
                </div>
            </div>

            <!-- 月別集計 -->
            <h3 class="text-sm font-bold text-slate-600 mb-2">▶ 月別集計</h3>
            <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto mb-5">
                <table class="w-full text-xs md:text-sm">
                    <thead class="bg-slate-100 text-slate-600 font-bold border-b-2">
                        <tr>
                            <th class="px-3 py-2 text-left">年月</th>
                            <th class="px-3 py-2 text-center">作成</th>
                            <th class="px-3 py-2 text-center">削除</th>
                            <th class="px-3 py-2 text-center">延べ参加者</th>
                        </tr>
                    </thead>
                    <tbody id="monthly-list" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>

            <!-- 個別ログ -->
            <h3 class="text-sm font-bold text-slate-600 mb-2">▶ イベント明細</h3>
            <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto">
                <table class="w-full text-xs md:text-sm">
                    <thead class="bg-slate-100 text-slate-600 font-bold border-b-2">
                        <tr>
                            <th class="px-3 py-2 text-left">日時</th>
                            <th class="px-3 py-2 text-center">イベント</th>
                            <th class="px-3 py-2 text-left">タイトル</th>
                            <th class="px-3 py-2 text-center">参加者数</th>
                        </tr>
                    </thead>
                    <tbody id="log-list" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 初回セットアップ画面 -->
    <div id="setup-screen" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border border-indigo-100">
            <h2 class="text-2xl font-bold text-slate-800 mb-2 flex items-center gap-2">🛡️ 初期セットアップ</h2>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed">管理者パスワードが設定されていません。システムを保護するために新しいパスワードを設定してください。</p>
            <div class="space-y-4">
                <input type="password" id="new-admin-pass" class="w-full p-4 border-2 rounded-2xl text-lg outline-none focus:border-indigo-500 transition-all" placeholder="新パスワード">
                <input type="password" id="new-admin-pass-confirm" class="w-full p-4 border-2 rounded-2xl text-lg outline-none focus:border-indigo-500 transition-all" placeholder="再入力（確認用）">
                <button id="btn-save-admin-pass" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-[0.98]">パスワードを確実に保存する</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, collection, query, getDocs, getDoc, setDoc, writeBatch, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbdT-7Po65EbzX82-mO9yXcW59Fjh7wjI",
            authDomain: "kpnagoya-keiko-sched.firebaseapp.com",
            projectId: "kpnagoya-keiko-sched",
            storageBucket: "kpnagoya-keiko-sched.firebasestorage.app",
            messagingSenderId: "267444260325",
            appId: "1:267444260325:web:87e3663e131840b4d7b30c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const hashPassword = async (p) => {
            if (!p || p.startsWith('$v1$')) return p || "";
            const b = new TextEncoder().encode(p);
            const h = await crypto.subtle.digest('SHA-256', b);
            return '$v1$' + Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2, '0')).join('');
        };
        const verifyPassword = async (input, stored) => {
            if (!stored) return true;
            if (!input) return false;
            if (stored.startsWith('$v1$')) {
                const hashedInput = await hashPassword(input);
                return hashedInput === stored;
            }
            return input === stored;
        };

        // Access Gate
        async function checkAccess() {
            try {
                const snap = await getDoc(doc(db, "system_config", "admin"));
                const adminDoc = snap.exists() ? snap.data() : null;

                if (!adminDoc) {
                    showSetup();
                } else {
                    const psw = prompt("管理者パスワードを入力してください:");
                    if (await verifyPassword(psw, adminDoc.password)) {
                        initDashboard();
                    } else {
                        alert("アクセスが拒否されました。");
                        window.location.href = "./";
                    }
                }
            } catch (e) {
                console.error(e);
                alert("セキュリティチェックに失敗しました。\nエラー内容: " + e.message);
            }
        }
        checkAccess();

        function showSetup() {
            document.getElementById('setup-screen').classList.remove('hidden');
            document.getElementById('btn-save-admin-pass').onclick = async () => {
                const p1 = document.getElementById('new-admin-pass').value.trim();
                const p2 = document.getElementById('new-admin-pass-confirm').value.trim();
                if (!p1) return alert("パスワードを入力してください");
                if (p1 !== p2) return alert("パスワードが一致しません");
                
                try {
                    const hashed = await hashPassword(p1);
                    await setDoc(doc(db, "system_config", "admin"), { password: hashed });
                    alert("管理者パスワードを設定しました。再読み込みします。");
                    location.reload();
                } catch(e) {
                    console.error(e);
                    alert("保存に失敗しました。詳細: " + e.message);
                }
            };
        }

        async function initDashboard() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const snap = await getDocs(query(collection(db, "projects")));
                const projects = [];
                snap.forEach(d => projects.push({ id: d.id, ...d.data() }));
                projects.sort((a,b) => new Date(a.endDate) - new Date(b.endDate));
                renderDashboard(projects);
            } catch (e) {
                console.error(e);
                alert("データの読み込みに失敗しました。ルールの権限などを確認してください。");
            }
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            loadUsageLog();
        }

        function renderDashboard(projects) {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            
            let tMem = 0, tObs = 0;
            const now = new Date();
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(now.getMonth() - 6);

            projects.forEach(p => {
                const memC = Array.isArray(p.members) ? p.members.length : 0;
                tMem += memC;
                let eDateStr = p.endDate;
                let sDateStr = p.startDate;
                const eDate = new Date(eDateStr);
                
                // スマホ用に年を省略する表示調整（文字幅削減）
                if (window.innerWidth < 768) {
                    sDateStr = sDateStr.slice(5).replace('-','/');
                    eDateStr = eDateStr.slice(5).replace('-','/');
                }

                let sTag = `<span class="bg-emerald-100 text-emerald-800 px-1 md:px-2 py-1 rounded text-[10px] md:text-xs font-bold">稼働中</span>`;
                if (eDate < now) sTag = `<span class="bg-slate-200 text-slate-600 px-1 md:px-2 py-1 rounded text-[10px] md:text-xs font-bold">終了</span>`;
                
                let isObs = false;
                if (eDate < sixMonthsAgo) {
                    sTag = `<span class="bg-rose-100 text-rose-800 px-1 md:px-2 py-1 rounded text-[10px] md:text-xs font-bold">削除対象</span>`;
                    tObs++;
                    isObs = true;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="px-2 py-3 text-center border-r border-slate-50"><input type="checkbox" class="chk-item w-4 h-4 cursor-pointer scale-125 md:scale-100" value="${p.id}"></td>
                    <td class="px-2 md:px-4 py-3 whitespace-nowrap">${sTag}</td>
                    <td class="px-2 md:px-4 py-3">
                        <a href="./?id=${p.id}" target="_blank" class="font-bold text-indigo-700 hover:underline inline-block truncate max-w-[120px] md:max-w-xs align-bottom">${p.title}</a>
                        <br><span class="hidden md:inline text-[10px] text-slate-400 font-mono">${p.id}</span>
                    </td>
                    <td class="px-2 md:px-4 py-3 text-center font-bold text-slate-600">${memC}</td>
                    <td class="px-2 md:px-4 py-3 text-slate-600 text-[10px] md:text-sm">${sDateStr} 〜 ${eDateStr}</td>
                    <td class="px-2 md:px-4 py-3 text-center">
                        <button onclick="deleteProject('${p.id}', '${p.title}')" class="bg-slate-100 border-2 border-slate-300 hover:bg-rose-50 hover:border-rose-400 hover:text-rose-600 text-slate-500 font-bold px-2 py-1 md:px-3 text-[10px] md:text-xs rounded-lg transition active:scale-95">削除</button>
                    </td>
                `;
                list.appendChild(tr);
            });

            document.getElementById('stat-total').innerText = projects.length;
            document.getElementById('stat-members').innerText = tMem;
            document.getElementById('stat-obsolete').innerText = tObs;
            document.getElementById('chk-all').checked = false;
        }

        window.toggleAll = (source) => {
            document.querySelectorAll('.chk-item').forEach(cb => cb.checked = source.checked);
        };

        window.bulkDelete = async () => {
            const checked = Array.from(document.querySelectorAll('.chk-item:checked'));
            if(checked.length === 0) {
                alert("削除する項目にチェックを入れてください。");
                return;
            }
            if(!confirm(`選択された ${checked.length} 件のプロジェクトを完全に削除します。本当によろしいですか？`)) return;
            
            const p = prompt("セキュリティ確認：管理者パスワードを入力してください");
            const snap = await getDoc(doc(db, "system_config", "admin"));
            const adminPass = snap.exists() ? snap.data().password : "";

            if(!await verifyPassword(p, adminPass)) {
                alert("パスワードが違います。一括削除を中止します。");
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');

            try {
                let deletedCount = 0;
                for(let cb of checked) {
                    const id = cb.value;
                    const resRef = collection(db, "projects", id, "responses");
                    const snp = await getDocs(resRef);
                    const batch = writeBatch(db);
                    snp.forEach(d => batch.delete(d.ref));
                    batch.delete(doc(db, "projects", id));
                    await batch.commit();
                    deletedCount++;
                }
                alert(`${deletedCount} 件のプロジェクトを完全に削除しました。`);
                initDashboard();
            } catch(e) {
                console.error(e);
                alert("一部の削除に失敗しました。ページをリロードして確認してください。");
                initDashboard();
            }
        };

        window.deleteProject = async (id, title) => {
            if(!confirm(`【注意】\n「${title}」のすべてのデータを完全に削除します。\nよろしいですか？`)) return;
            
            try {
                const resRef = collection(db, "projects", id, "responses");
                const snp = await getDocs(resRef);
                const batch = writeBatch(db);
                snp.forEach(d => batch.delete(d.ref));
                batch.delete(doc(db, "projects", id));
                await batch.commit();
                
                initDashboard();
            } catch(e) {
                console.error(e);
                alert("削除に失敗しました。");
            }
        };
        async function loadUsageLog() {
            try {
                const snap = await getDocs(query(collection(db, "usage_log"), orderBy("timestamp", "desc"), limit(200)));
                const logs = [];
                snap.forEach(d => logs.push(d.data()));

                // 累計集計
                let totalCreated = 0, totalDeleted = 0, totalMembers = 0;
                // 月別集計マップ: { 'YYYY/MM': { created, deleted, members } }
                const monthly = {};

                logs.forEach(l => {
                    const ts = l.timestamp ? new Date(l.timestamp.seconds * 1000) : null;
                    const ym = ts ? `${ts.getFullYear()}/${String(ts.getMonth()+1).padStart(2,'0')}` : '不明';
                    if(!monthly[ym]) monthly[ym] = { created: 0, deleted: 0, members: 0 };

                    if(l.event === 'project_created') {
                        totalCreated++;
                        totalMembers += (l.memberCount || 0);
                        monthly[ym].created++;
                        monthly[ym].members += (l.memberCount || 0);
                    }
                    if(l.event === 'project_deleted') {
                        totalDeleted++;
                        monthly[ym].deleted++;
                    }
                });

                // 累計カード更新
                document.getElementById('log-created').textContent = totalCreated;
                document.getElementById('log-deleted').textContent = totalDeleted;
                document.getElementById('log-members').textContent = totalMembers;

                // 月別テーブル（年月順、新しい順）
                const monthlyTbody = document.getElementById('monthly-list');
                const sortedMonths = Object.keys(monthly).sort().reverse();
                monthlyTbody.innerHTML = sortedMonths.map(ym => {
                    const m = monthly[ym];
                    return `<tr class="hover:bg-slate-50">
                        <td class="px-3 py-2 font-bold">${ym}</td>
                        <td class="px-3 py-2 text-center text-emerald-700 font-bold">${m.created > 0 ? '+'+m.created : '-'}</td>
                        <td class="px-3 py-2 text-center text-rose-600 font-bold">${m.deleted > 0 ? '-'+m.deleted : '-'}</td>
                        <td class="px-3 py-2 text-center text-indigo-700 font-bold">${m.members > 0 ? m.members+'名' : '-'}</td>
                    </tr>`;
                }).join('');

                // 個別イベント明細
                const evLabel = { project_created: '作成', project_deleted: '削除' };
                const evColor = { project_created: 'bg-emerald-100 text-emerald-800', project_deleted: 'bg-rose-100 text-rose-800' };
                const tbody = document.getElementById('log-list');
                tbody.innerHTML = logs
                    .filter(l => l.event === 'project_created' || l.event === 'project_deleted')
                    .map(l => {
                        const ts = l.timestamp ? new Date(l.timestamp.seconds * 1000) : null;
                        const tsStr = ts ? `${ts.getFullYear()}/${ts.getMonth()+1}/${ts.getDate()} ${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}` : '-';
                        const badge = `<span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${evColor[l.event] || 'bg-slate-100 text-slate-600'}">${evLabel[l.event] || l.event}</span>`;
                        return `<tr class="hover:bg-slate-50">
                            <td class="px-3 py-2 text-slate-500 whitespace-nowrap">${tsStr}</td>
                            <td class="px-3 py-2 text-center">${badge}</td>
                            <td class="px-3 py-2 font-bold truncate max-w-[150px] md:max-w-xs">${l.title || '-'}</td>
                            <td class="px-3 py-2 text-center">${l.memberCount != null ? l.memberCount + '名' : '-'}</td>
                        </tr>`;
                    }).join('');

                document.getElementById('log-section').classList.remove('hidden');
            } catch(e) {
                console.error('usage_log読み込み失敗:', e);
            }
        }
    </script>
</body>
</html>
