<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>システム管理画面 | KeiCall Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kosugi Maru', 'Noto Sans JP', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-6 flex items-center gap-2 border-b-4 border-indigo-200 pb-3">
            <span>⚙️</span> システム管理ダッシュボード
            <a href="/" class="ml-auto text-sm bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg transition font-normal text-slate-700">ホームへ戻る</a>
        </h1>

        <div id="loading" class="text-center py-10 font-bold text-slate-500 hidden">データを読み込み中...</div>

        <div id="dashboard" class="hidden">
            <!-- Metrics -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-sm font-bold text-slate-500 mb-1">総プロジェクト数</p>
                    <p id="stat-total" class="text-4xl font-bold text-indigo-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-sm font-bold text-slate-500 mb-1">総登録メンバー（延べ数）</p>
                    <p id="stat-members" class="text-4xl font-bold text-blue-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center cursor-help" title="終了日から6ヶ月以上経過している、削除推奨のプロジェクト数">
                    <p class="text-sm font-bold text-slate-500 mb-1">削除推奨（6ヶ月経過）</p>
                    <p id="stat-obsolete" class="text-4xl font-bold text-rose-600">0</p>
                </div>
            </div>

            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6 rounded-r-2xl shadow-sm">
                <p class="font-bold text-yellow-800 mb-1">管理者用ガイダンス</p>
                <p class="text-sm text-yellow-700">この画面はURL（/kpn_sysadmin.html）を知るパスワード保持者のみアクセス可能です。<br>リストは終了日（古い順）に並びます。赤い「削除対象」となっているものは規約に基づきボタン一つで完全に消去できます。</p>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <table class="w-full text-sm text-left whitespace-nowrap">
                    <thead class="bg-slate-100 text-slate-600 font-bold text-xs uppercase border-b-2">
                        <tr>
                            <th class="px-4 py-3 w-16">状態</th>
                            <th class="px-4 py-3">公演名 (ID)</th>
                            <th class="px-4 py-3 text-center w-24">メンバー</th>
                            <th class="px-4 py-3 w-48">日程 (開始〜終了)</th>
                            <th class="px-4 py-3 text-center w-24">操作</th>
                        </tr>
                    </thead>
                    <tbody id="project-list" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, collection, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbdT-7Po65EbzX82-mO9yXcW59Fjh7wjI",
            authDomain: "kpnagoya-keiko-sched.firebaseapp.com",
            projectId: "kpnagoya-keiko-sched",
            storageBucket: "kpnagoya-keiko-sched.firebasestorage.app",
            messagingSenderId: "267444260325",
            appId: "1:267444260325:web:87e3663e131840b4d7b30c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Access Gate
        const psw = prompt("管理者パスワードを入力してください:");
        if (psw !== "Kangeki758kcb") {
            alert("アクセスが拒否されました。");
            window.location.href = "/";
        } else {
            initDashboard();
        }

        async function initDashboard() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const snap = await getDocs(query(collection(db, "projects")));
                const projects = [];
                snap.forEach(d => projects.push({ id: d.id, ...d.data() }));
                
                // 終了日順（古い順）にソート
                projects.sort((a,b) => new Date(a.endDate) - new Date(b.endDate));
                
                renderDashboard(projects);
            } catch (e) {
                console.error(e);
                alert("データの読み込みに失敗しました。ルールの権限などを確認してください。");
            }
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function renderDashboard(projects) {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            
            let tMem = 0, tObs = 0;
            const now = new Date();
            const sixMonthsAgo = new Date();
            sixMonthsAgo.setMonth(now.getMonth() - 6);

            projects.forEach(p => {
                const memC = Array.isArray(p.members) ? p.members.length : 0;
                tMem += memC;
                const eDate = new Date(p.endDate);
                
                let sTag = `<span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-xs font-bold">稼働中</span>`;
                if (eDate < now) sTag = `<span class="bg-slate-200 text-slate-600 px-2 py-1 rounded text-xs font-bold">終了済み</span>`;
                
                let isObs = false;
                if (eDate < sixMonthsAgo) {
                    sTag = `<span class="bg-rose-100 text-rose-800 px-2 py-1 rounded text-xs font-bold">削除対象</span>`;
                    tObs++;
                    isObs = true;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap">${sTag}</td>
                    <td class="px-4 py-3"><a href="./?id=${p.id}" target="_blank" class="font-bold text-indigo-700 hover:underline">${p.title}</a><br><span class="text-[10px] text-slate-400 font-mono">${p.id}</span></td>
                    <td class="px-4 py-3 text-center font-bold text-slate-600">${memC}</td>
                    <td class="px-4 py-3 text-slate-600">${p.startDate} 〜 ${p.endDate}</td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="deleteProject('${p.id}', '${p.title}')" class="bg-white border-2 border-rose-500 hover:bg-rose-50 text-rose-600 font-bold px-3 py-1.5 rounded-lg shadow-sm text-xs transition active:scale-95">個別削除</button>
                    </td>
                `;
                list.appendChild(tr);
            });

            document.getElementById('stat-total').innerText = projects.length;
            document.getElementById('stat-members').innerText = tMem;
            document.getElementById('stat-obsolete').innerText = tObs;
        }

        window.deleteProject = async (id, title) => {
            const code = prompt(`【警告】\n「${title}」のすべてのデータ（設定と回答）を完全に削除します。\n削除を実行するには、プロジェクトIDの下4桁を入力してください。`);
            if(!code) return;
            const tail = id.slice(-4);
            if(code !== tail) {
                alert("IDが一致しませんでした。削除を中止します。");
                return;
            }
            
            try {
                // サブコレクション（回答）を全件取得して削除
                const resRef = collection(db, "projects", id, "responses");
                const snp = await getDocs(resRef);
                const batch = writeBatch(db);
                snp.forEach(d => batch.delete(d.ref));
                // 親のプロジェクトドキュメントを削除
                batch.delete(doc(db, "projects", id));
                await batch.commit();
                
                alert("完全に削除しました。");
                initDashboard();
            } catch(e) {
                console.error(e);
                alert("削除に失敗しました。");
            }
        };
    </script>
</body>
</html>
